<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonateLife | Blood Request</title>
    <link rel="shortcut icon" href="images/favicon.png">
    <link rel="stylesheet" href="styles/blood-request.css">
    <link rel="stylesheet" href="styles/navbar.css">
    <link rel="stylesheet" href="styles/footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .error-text { color: red; font-size: 0.8rem; margin-top: 4px; display: block; }
        .input-error { border-color: red !important; }
    </style>
</head>
<body>

<nav>
    <div class="logo"><img src="images/logo (2).png" alt=""></div>
    <ul class="nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="blood-bank.html">Blood Bank</a></li>
        <li><a href="search-donor.html">Search Donor</a></li>
        <li><a href="request.html">Blood Request</a></li>
        <li><a href="donate-blood.html">Donate Blood</a></li>
    </ul>
</nav>

<div class="main-container">
    <section class="form-wrapper">
        <h2><i class="fa-solid fa-droplet"></i> Post Blood Request</h2>
        <div id="reqMsg" style="display:none;padding:12px 16px;border-radius:5px;margin-bottom:14px;font-weight:600;"></div>
        <form id="bloodForm">
            <div class="box"><label>Patient Name</label><input type="text" id="patientName" placeholder="Enter patient's name" required><span id="patientName-error" class="error-text"></span></div>
            <div class="box"><label>Blood Group</label>
                <select id="bloodGroup" required>
                    <option value="">-- Choose Group --</option>
                    <option value="A+">A+</option><option value="A-">A-</option>
                    <option value="B+">B+</option><option value="B-">B-</option>
                    <option value="O+">O+</option><option value="O-">O-</option>
                    <option value="AB+">AB+</option><option value="AB-">AB-</option>
                </select>
                <span id="bloodGroup-error" class="error-text"></span>
            </div>
            <div class="box"><label>How Many Bags Needed</label><input type="number" id="bags" placeholder="Enter number of bags" min="1" required><span id="bags-error" class="error-text"></span></div>
            <div class="box"><label>Location / Hospital</label><input type="text" id="hospital" placeholder="Hospital Name & City" required><span id="hospital-error" class="error-text"></span></div>
            <div class="box"><label>Mobile Number</label><input type="tel" id="phone" placeholder="01XXXXXXXXX" required><span id="phone-error" class="error-text"></span></div>
            <div class="box"><label>When Blood is Needed (Date & Time)</label><input type="datetime-local" id="neededBy" required><span id="neededBy-error" class="error-text"></span></div>
            <button type="submit" class="req-btn" id="reqBtn">SUBMIT REQUEST</button>
        </form>
    </section>

    <section class="posts-section">
        <p id="loadingMsg" style="text-align:center;color:#888;padding:20px;">Loading requests…</p>
        <div id="postsDisplay"></div>
    </section>
</div>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-box">
        <img src="images/footer-logo.png" alt="">
        <h1>Donate Blood, Save Life</h1>
    </div>

    <div class="footer-box">
        <h3>Important Links</h3>
        <a href="index.html">Home</a>
        <a href="search-donor.html">Search Donor</a>
        <a href="blood-bank.html">Blood Bank</a>
        <a href="request.html">Blood Request</a>
        <a href="donate-blood.html">Donate Blood</a>
    </div>

    <div class="footer-box">
        <h3>Contact & Socials</h3>
        <p>Phone: <a id="footer-phone-link" href="tel:"></a></p>
        <p>Email: <a id="footer-email-link" href="mailto:"></a></p>
        <p>Address: <span id="footer-address"></span></p>
        <div class="socials">
            <a id="facebook-link" href="#" target="_blank"><i class="fa-brands fa-facebook"></i></a>
            <a id="instagram-link" href="#" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a id="twitter-link" href="#" target="_blank"><i class="fa-brands fa-twitter"></i></a>
        </div>
    </div>

    <!-- Copyright -->
    <div class="footer-bottom">
        <p>© 2026 DonateLife. All Rights Reserved.</p>
    </div>
</footer>

<script type="module" src="firebase-init.js"></script>
<script type="module" src="scripts/footer-settings.js"></script>

<script type="module">
import { db } from './firebase-init.js';
import {
    collection, addDoc, query, orderBy,
    onSnapshot, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
import { validateName, validatePhone, validateBags, validateBloodType, showError, clearErrors } from './validators.js';

// Helper: check if a neededBy date is in the past
function isExpired(neededByValue) {
    if (!neededByValue) return false;
    let neededDate;
    if (neededByValue.toDate) {
        neededDate = neededByValue.toDate();
    } else {
        neededDate = new Date(neededByValue);
    }
    return neededDate < new Date();
}

const form = document.getElementById('bloodForm');
const postsDiv = document.getElementById('postsDisplay');
const reqBtn = document.getElementById('reqBtn');
const msgBox = document.getElementById('reqMsg');
const loadingMsg = document.getElementById('loadingMsg');

function showMsg(text, ok) {
    msgBox.textContent = text;
    msgBox.style.background = ok ? '#d4edda' : '#f8d7da';
    msgBox.style.color = ok ? '#155724' : '#721c24';
    msgBox.style.display = 'block';
    setTimeout(() => { msgBox.style.display = 'none'; }, 4000);
}

// Validate neededBy (must be a future date/time)
function validateNeededBy(neededByValue) {
    if (!neededByValue) {
        return { valid: false, msg: 'Please specify when blood is needed' };
    }
    const selectedDate = new Date(neededByValue);
    if (isNaN(selectedDate.getTime())) {
        return { valid: false, msg: 'Invalid date/time' };
    }
    if (selectedDate <= new Date()) {
        return { valid: false, msg: 'Needed date/time must be in the future' };
    }
    return { valid: true };
}

function validateForm() {
    let isValid = true;
    const patientName = document.getElementById('patientName').value.trim();
    const bloodGroup = document.getElementById('bloodGroup').value;
    const bags = document.getElementById('bags').value;
    const hospital = document.getElementById('hospital').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const neededBy = document.getElementById('neededBy').value;

    clearErrors('patientName', 'bloodGroup', 'bags', 'hospital', 'phone', 'neededBy');

    const nameVal = validateName(patientName);
    if (!nameVal.valid) { showError('patientName', nameVal.msg); isValid = false; }

    const bloodVal = validateBloodType(bloodGroup);
    if (!bloodVal.valid) { showError('bloodGroup', bloodVal.msg); isValid = false; }

    const bagsVal = validateBags(bags);
    if (!bagsVal.valid) { showError('bags', bagsVal.msg); isValid = false; }

    if (!hospital || hospital.length < 3) {
        showError('hospital', 'Please enter a valid hospital name');
        isValid = false;
    }

    const phoneVal = validatePhone(phone);
    if (!phoneVal.valid) { showError('phone', phoneVal.msg); isValid = false; }

    const neededVal = validateNeededBy(neededBy);
    if (!neededVal.valid) { showError('neededBy', neededVal.msg); isValid = false; }

    return isValid;
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!validateForm()) {
        showMsg('Please fix the errors above before submitting.', false);
        return;
    }

    const v = id => document.getElementById(id).value.trim();
    try {
        reqBtn.disabled = true;
        reqBtn.textContent = 'Submitting…';
        await addDoc(collection(db, 'public_requests'), {
            patientName: v('patientName'),
            bloodGroup: v('bloodGroup'),
            bags: parseInt(v('bags')),
            hospital: v('hospital'),
            phone: v('phone'),
            neededBy: new Date(v('neededBy')),
            status: 'approved',
            createdAt: serverTimestamp()
        });
        showMsg('✅ Request posted successfully!', true);
        form.reset();
        clearErrors('patientName', 'bloodGroup', 'bags', 'hospital', 'phone', 'neededBy');
    } catch (err) {
        console.error('Error posting request:', err);
        showMsg('❌ Failed to post request. Please try again.', false);
    } finally {
        reqBtn.disabled = false;
        reqBtn.textContent = 'SUBMIT REQUEST';
    }
});

// Real-time validation on blur
document.getElementById('patientName').addEventListener('blur', () => {
    const r = validateName(document.getElementById('patientName').value.trim());
    if (!r.valid) showError('patientName', r.msg); else showError('patientName', '');
});
document.getElementById('bloodGroup').addEventListener('change', () => {
    const r = validateBloodType(document.getElementById('bloodGroup').value);
    if (!r.valid) showError('bloodGroup', r.msg); else showError('bloodGroup', '');
});
document.getElementById('bags').addEventListener('blur', () => {
    const r = validateBags(document.getElementById('bags').value);
    if (!r.valid) showError('bags', r.msg); else showError('bags', '');
});
document.getElementById('phone').addEventListener('blur', () => {
    const r = validatePhone(document.getElementById('phone').value.trim());
    if (!r.valid) showError('phone', r.msg); else showError('phone', '');
});
document.getElementById('neededBy').addEventListener('change', () => {
    const val = document.getElementById('neededBy').value;
    const r = validateNeededBy(val);
    if (!r.valid) showError('neededBy', r.msg); else showError('neededBy', '');
});

// Real-time feed: filter out expired requests
const q = query(collection(db, 'public_requests'), orderBy('createdAt', 'desc'));
onSnapshot(q, (snapshot) => {
    loadingMsg.style.display = 'none';
    const now = new Date();
    let activeRequests = [];
    snapshot.forEach(doc => {
        const r = doc.data();
        // Only approve status and not expired based on neededBy
        if (r.status === 'approved') {
            let expired = false;
            if (r.neededBy) {
                const neededDate = r.neededBy.toDate ? r.neededBy.toDate() : new Date(r.neededBy);
                if (neededDate < now) {
                    expired = true;
                }
            }
            if (!expired) {
                activeRequests.push({ id: doc.id, ...r });
            }
        }
    });

    if (activeRequests.length === 0) {
        postsDiv.innerHTML = '<p style="text-align:center;color:#888;">No active blood requests.</p>';
        return;
    }

    let html = '';
    activeRequests.forEach(r => {
        const time = r.createdAt ? new Date(r.createdAt.toDate()).toLocaleString() : 'Just now';
        html += `
            <div class="blood-card">
                <div class="card-head">
                    <span class="group">${r.bloodGroup || '?'}</span>
                    <strong>${r.patientName || 'Unknown'}</strong>
                </div>
                <div class="card-details">
                    <p><strong>Bags:</strong> ${r.bags || 1} &nbsp;|&nbsp; <strong>Hospital:</strong> ${r.hospital || 'N/A'}</p>
                    <p class="call"><i class="fa-solid fa-phone"></i> ${r.phone || 'N/A'}</p>
                </div>
                <div class="card-time">Posted on: ${time}</div>
            </div>`;
    });
    postsDiv.innerHTML = html;
}, (err) => {
    console.error('Snapshot error:', err);
    loadingMsg.textContent = 'Error loading requests.';
});
</script>

<script>
(function () {
    const nav = document.querySelector('nav');
    const navList = nav?.querySelector('.nav');
    if (nav && navList) {
        const btn = document.createElement('button');
        btn.className = 'hamburger';
        btn.setAttribute('aria-label', 'Toggle menu');
        btn.innerHTML = '<span></span><span></span><span></span>';
        nav.insertBefore(btn, navList);
 
        btn.addEventListener('click', () => {
            btn.classList.toggle('open');
            navList.classList.toggle('open');
        });
 
        document.addEventListener('click', (e) => {
            if (!nav.contains(e.target)) {
                btn.classList.remove('open');
                navList.classList.remove('open');
            }
        });
 
        navList.querySelectorAll('a').forEach(a =>
            a.addEventListener('click', () => {
                btn.classList.remove('open');
                navList.classList.remove('open');
            })
        );
    }
})();
</script>

</body>
</html>
